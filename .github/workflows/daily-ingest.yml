name: Scheduled ingest

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run ingest
        env:
          API_KEY: ${{ secrets.API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          EMAIL_INGEST_HOST: ${{ secrets.EMAIL_INGEST_HOST }}
          EMAIL_INGEST_PORT: ${{ secrets.EMAIL_INGEST_PORT }}
          EMAIL_INGEST_SECURE: ${{ secrets.EMAIL_INGEST_SECURE }}
          EMAIL_INGEST_USER: ${{ secrets.EMAIL_INGEST_USER }}
          EMAIL_INGEST_PASSWORD: ${{ secrets.EMAIL_INGEST_PASSWORD }}
          EMAIL_INGEST_MAILBOX: ${{ secrets.EMAIL_INGEST_MAILBOX }}
          EMAIL_INGEST_LOOKBACK_DAYS: ${{ secrets.EMAIL_INGEST_LOOKBACK_DAYS }}
          EMAIL_INGEST_MAX_MESSAGES: ${{ secrets.EMAIL_INGEST_MAX_MESSAGES }}
        run: npm run ingest
